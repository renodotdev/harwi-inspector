<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; padding: 24px; background: #202124; color: white; font: 600 14px system-ui; }
      h2 { margin: 0 0 12px; font-size: 18px; }
      .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
      figure { margin: 0; }
      figcaption { margin-bottom: 8px; color: #d0d4d9; }
      .frame { height: 620px; overflow: hidden; border-radius: 8px; background: white; }
      img { display: block; width: 100%; height: auto; }
    </style>
  </head>
  <body>
    <h2>Dashboard · desktop</h2>
    <div class="pair">
      <figure><figcaption>Before</figcaption><div class="frame"><img src="before/01-dashboard-desktop.png" /></div></figure>
      <figure><figcaption>After</figcaption><div class="frame"><img src="after/01-dashboard-desktop.png" /></div></figure>
    </div>
    <h2>New inspection · desktop</h2>
    <div class="pair">
      <figure><figcaption>Before</figcaption><div class="frame"><img src="before/03-new-desktop.png" /></div></figure>
      <figure><figcaption>After</figcaption><div class="frame"><img src="after/03-new-desktop.png" /></div></figure>
    </div>
    <h2>Inspection detail · desktop</h2>
    <div class="pair">
      <figure><figcaption>Before</figcaption><div class="frame"><img src="before/05-detail-desktop.png" /></div></figure>
      <figure><figcaption>After</figcaption><div class="frame"><img src="after/05-detail-desktop.png" /></div></figure>
    </div>
  </body>
</html>
